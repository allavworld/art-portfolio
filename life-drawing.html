<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alla — Life Drawing</title>
<style>
  *,*::before,*::after { box-sizing: border-box; }
  html { -webkit-font-smoothing: antialiased; }
  body {
    margin: 0;
    font-family: ui-serif, Georgia, "Times New Roman", serif;
    color: #1a1a1a;
    background: #fafaf7;
    line-height: 1.5;
  }
  header {
    padding: 4rem 2rem 2rem;
    text-align: center;
    border-bottom: 1px solid #e8e6df;
  }
  header h1 {
    margin: 0 0 .5rem;
    font-size: clamp(2rem, 5vw, 3rem);
    font-weight: 400;
    letter-spacing: .02em;
  }
  header p {
    margin: 0;
    color: #6b6b66;
    font-size: 1rem;
    font-style: italic;
  }
  nav {
    text-align: center;
    padding: 1.25rem 1rem;
    border-bottom: 1px solid #e8e6df;
    font-size: .95rem;
  }
  nav a {
    color: #4a4a45;
    text-decoration: none;
    margin: 0 1rem;
    padding-bottom: 2px;
    border-bottom: 1px solid transparent;
    transition: border-color .2s;
  }
  nav a:hover { border-bottom-color: #4a4a45; }
  nav a.current { border-bottom-color: #1a1a1a; color: #1a1a1a; }

  main {
    max-width: 1400px;
    margin: 0 auto;
    padding: 3rem 1.5rem;
  }
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
    gap: 1.25rem;
  }
  figure {
    margin: 0;
    cursor: zoom-in;
  }
  figure img {
    width: 100%;
    height: auto;
    display: block;
    background: #efeee8;
    transition: opacity .25s ease;
  }
  figure img:hover { opacity: .88; }

  footer {
    text-align: center;
    padding: 3rem 1.5rem 4rem;
    color: #8c8c85;
    font-size: .85rem;
  }

  /* Lightbox */
  .lightbox {
    position: fixed; inset: 0;
    background: rgba(20, 20, 18, .94);
    display: none;
    z-index: 100;
    cursor: zoom-out;
    overflow: auto;
  }
  .lightbox.open { display: flex; align-items: center; justify-content: center; }
  .lightbox img {
    max-width: 100%;
    max-height: 100%;
    object-fit: contain;
    cursor: zoom-in;
    box-shadow: 0 20px 60px rgba(0,0,0,.5);
  }
  .lightbox.actual { align-items: flex-start; justify-content: flex-start; padding: 2rem; }
  .lightbox.actual img {
    max-width: none; max-height: none;
    width: auto; height: auto;
    object-fit: none;
    cursor: zoom-out;
    margin: auto;
  }
  .lightbox .hint {
    position: fixed;
    bottom: 1.25rem;
    left: 50%;
    transform: translateX(-50%);
    color: rgba(255,255,255,.55);
    font-size: .8rem;
    font-style: italic;
    pointer-events: none;
    user-select: none;
    letter-spacing: .03em;
  }
</style>
</head>
<body>

<header>
  <h1>Alla</h1>

<div class="lightbox" id="lightbox" aria-hidden="true">
  <img src="" alt="">
  <span class="hint" id="lbHint">click image to view at actual size · esc to close</span>
</div>

<script>
  const grid = document.getElementById('grid');
  const lb = document.getElementById('lightbox');
  const lbImg = lb.querySelector('img');
  const lbHint = document.getElementById('lbHint');

  function openLightbox(src, alt) {
    lbImg.src = src;
    lbImg.alt = alt;
    lb.classList.add('open');
    lb.classList.remove('actual');
    lb.setAttribute('aria-hidden', 'false');
    lb.scrollTo(0, 0);
    lbHint.textContent = 'click image to view at actual size · esc to close';
  }
  function closeLightbox() {
    lb.classList.remove('open', 'actual');
    lb.setAttribute('aria-hidden', 'true');
    lbImg.src = '';
  }

  grid.addEventListener('click', e => {
    const fig = e.target.closest('figure');
    if (!fig) return;
    const img = fig.querySelector('img');
    openLightbox(img.src, img.alt);
  });

  lb.addEventListener('click', e => {
    if (e.target === lbImg) {
      lb.classList.toggle('actual');
      lb.scrollTo(0, 0);
      lbHint.textContent = lb.classList.contains('actual')
        ? 'click image to fit · esc to close'
        : 'click image to view at actual size · esc to close';
    } else {
      closeLightbox();
    }
  });

  document.addEventListener('keydown', e => {
    if (e.key === 'Escape' && lb.classList.contains('open')) closeLightbox();
  });
</script>
